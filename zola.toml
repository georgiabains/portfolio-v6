base_url = "https://georgiabains.com"
title = "Georgia Bains"
description = "Georgia Bains is a frontend developer specialising in accessibility. Browse this blog to learn more about accessible approaches to web development."

default_language = "en"
author = "Georgia Bains"

compile_sass = false
minify_html = true

taxonomies = [
  { name = "tagged", feed = true, paginate_by = 5 }
]

build_search_index = true
generate_sitemap = true
generate_robots_txt = true

[markdown.highlighting]
error_on_missing_language = true
# Passes WCAG 2.1 AA accessibility requirements
theme = "github-dark-high-contrast"
